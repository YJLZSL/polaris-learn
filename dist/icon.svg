<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Night-sky background gradient: deep indigo → indigo → bright violet -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="55%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- North Star gold gradient -->
    <linearGradient id="star" x1="0" y1="110" x2="0" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Warm halo behind the star -->
    <radialGradient id="starGlow" cx="256" cy="230" r="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft ambient center glow -->
    <radialGradient id="centerGlow" cx="256" cy="230" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Open book pages gradient -->
    <linearGradient id="book" x1="0" y1="371" x2="0" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <ellipse cx="256" cy="230" rx="210" ry="190" fill="url(#centerGlow)"/>

  <!-- Constellation (knowledge points) with connecting lines -->
  <g stroke="#fef3c7" stroke-width="1.2" opacity="0.18" fill="none" stroke-linecap="round">
    <line x1="90" y1="120" x2="150" y2="80"/>
    <line x1="150" y1="80" x2="256" y2="44"/>
    <line x1="256" y1="44" x2="380" y2="90"/>
    <line x1="380" y1="90" x2="420" y2="150"/>
    <line x1="90" y1="120" x2="105" y2="300"/>
    <line x1="420" y1="150" x2="430" y2="320"/>
  </g>
  <g fill="#fef3c7">
    <circle cx="90" cy="120" r="3.6" opacity="0.85"/>
    <circle cx="150" cy="80" r="2.4" opacity="0.6"/>
    <circle cx="256" cy="44" r="2.6" opacity="0.6"/>
    <circle cx="380" cy="90" r="2.6" opacity="0.6"/>
    <circle cx="420" cy="150" r="3" opacity="0.75"/>
    <circle cx="105" cy="300" r="2.6" opacity="0.6"/>
    <circle cx="430" cy="320" r="3" opacity="0.7"/>
  </g>

  <!-- Star glow halo -->
  <circle cx="256" cy="230" r="170" fill="url(#starGlow)"/>

  <!-- Open book (represents learning) -->
  <path d="M256 371 L110 386 L100 430 L256 420 Z" fill="url(#book)" opacity="0.94"/>
  <path d="M256 371 L402 386 L412 430 L256 420 Z" fill="url(#book)" opacity="0.94"/>
  <line x1="256" y1="371" x2="256" y2="420" stroke="#ffffff" stroke-width="2" opacity="0.55"/>
  <g stroke="#4338ca" stroke-width="2.2" opacity="0.4" stroke-linecap="round">
    <line x1="140" y1="402" x2="240" y2="392"/>
    <line x1="148" y1="416" x2="244" y2="406"/>
    <line x1="272" y1="392" x2="372" y2="402"/>
    <line x1="268" y1="406" x2="364" y2="416"/>
  </g>

  <!-- 4-pointed North Star (Polaris) -->
  <path d="M256 110 L290 196 L376 230 L290 264 L256 350 L222 264 L136 230 L222 196 Z" fill="url(#star)"/>
  <circle cx="256" cy="230" r="18" fill="#ffffff"/>
</svg>
