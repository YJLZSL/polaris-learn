  # ==================== LLM Proxy ====================
  /llm-api/chat:
    post:
      tags:
        - LLM Proxy
      summary: LLM聊天补全（OpenAI兼容）
      description: |
        公开LLM代理接口，兼容 OpenAI Chat Completions API 格式。
        使用您的 API Key 进行认证，支持 Provider 健康检查和故障转移。

        **认证方式**: `X-API-Key` 请求头或 `Authorization: Bearer` 请求头

        **支持的Provider**: deepseek, qwen, openai, ollama, custom
      operationId: llmChatCompletions
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LLMChatRequest"
            examples:
              basic:
                summary: 基础聊天
                value:
                  model: "deepseek-chat"
                  messages:
                    - role: "system"
                      content: "你是一位专业的数学老师。"
                    - role: "user"
                      content: "请解释什么是微积分？"
                  temperature: 0.7
                  max_tokens: 2048
              streaming:
                summary: 流式响应
                value:
                  model: "deepseek-chat"
                  messages:
                    - role: "user"
                      content: "写一首关于学习的诗"
                  stream: true
      responses:
        "200":
          description: 聊天补全结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LLMChatResponse"
              example:
                id: "chatcmpl-abc123"
                object: "chat.completion"
                created: 1746600000
                model: "deepseek-chat"
                choices:
                  - index: 0
                    message:
                      role: "assistant"
                      content: "微积分是数学的一个分支，主要研究函数的变化率和累积量..."
                    finish_reason: "stop"
                usage:
                  prompt_tokens: 45
                  completion_tokens: 200
                  total_tokens: 245
                  cost: 0.0006
        "400":
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "模型不能为空"
        "401":
          description: API Key无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Invalid API key"
        "402":
          description: 余额不足
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "余额不足，请充值后重试"
        "429":
          description: 请求频率超过限制
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "请求频率过高，请稍后重试"

  /llm-api/models:
    get:
      tags:
        - LLM Proxy
      summary: 获取可用模型列表
      description: |
        返回所有健康Provider的可用模型列表及定价信息。
        仅返回当前状态为健康的Provider的模型。
      operationId: listModels
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: 模型列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelsResponse"
              example:
                providers:
                  - name: "deepseek"
                    healthy: true
                    models:
                      - id: "deepseek-chat"
                        provider: "deepseek"
                        displayName: "DeepSeek Chat"
                        pricing:
                          input: 1.0e-6
                          output: 2.0e-6
                healthyCount: 3
                totalCount: 4
        "401":
          description: API Key无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ==================== Billing ====================
  /api/billing/balance:
    get:
      tags:
        - Billing
      summary: 查询账户余额
      description: 获取当前用户的账户余额（优先从Redis读取，降级到数据库）
      operationId: getBalance
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 余额信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResponse"
              example:
                balance: 12.50
                currency: "CNY"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/billing/recharge:
    post:
      tags:
        - Billing
      summary: 账户充值
      description: |
        创建充值订单。
        - 开发环境：自动完成充值
        - 生产环境：生成支付链接
      operationId: recharge
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RechargeRequest"
            example:
              amount: 10
              paymentMethod: "alipay"
      responses:
        "200":
          description: 充值结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RechargeResponse"
              examples:
                dev:
                  summary: 开发环境（自动完成）
                  value:
                    id: "rech_abc123"
                    amount: 10
                    paymentMethod: "alipay"
                    status: "success"
                    balance: 22.50
                    createdAt: "2026-05-07T10:00:00Z"
                production:
                  summary: 生产环境（待支付）
                  value:
                    id: "rech_abc123"
                    amount: 10
                    paymentMethod: "alipay"
                    status: "pending"
                    paymentUrl: "https://pay.example.com/order/abc123"
                    createdAt: "2026-05-07T10:00:00Z"
        "400":
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "充值金额必须为有效数字"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/billing/usage:
    get:
      tags:
        - Billing
      summary: 查询用量统计
      description: 获取当前用户当月的API用量汇总和近30天的每日用量明细
      operationId: getUsage
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 用量统计
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResponse"
              example:
                monthSummary:
                  requestCount: 256
                  totalTokens: 128000
                  totalCost: 0.35
                dailyUsage:
                  - date: "2026-05-01"
                    requestCount: 15
                    totalTokens: 7500
                    totalCost: 0.02
                  - date: "2026-05-02"
                    requestCount: 22
                    totalTokens: 11000
                    totalCost: 0.03
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ==================== Questions ====================
  /api/questions:
    get:
      tags:
        - Questions
      summary: 获取题目列表
      description: 公开获取题目列表，支持按学科、难度、年级、题型筛选
      operationId: getQuestions
      security:
        - BearerAuth: []
      parameters:
        - name: subject
          in: query
          description: 学科筛选
          required: false
          schema:
            type: string
          example: "数学"
        - name: difficulty
          in: query
          description: 难度等级（1-5）
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 5
          example: 3
        - name: gradeLevel
          in: query
          description: 年级筛选
          required: false
          schema:
            type: string
          example: "初三"
        - name: type
          in: query
          description: 题型筛选
          required: false
          schema:
            type: string
            enum: [choice, fill, essay]
          example: "choice"
        - name: limit
          in: query
          description: 每页数量（最大100）
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          description: 偏移量
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: 题目列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionListResponse"
              example:
                questions:
                  - id: "q_abc123"
                    subject: "数学"
                    type: "choice"
                    difficulty: 3
                    content: "已知直角三角形两条直角边分别为3和4，则斜边长为？"
                    options:
                      - "A. 5"
                      - "B. 6"
                      - "C. 7"
                      - "D. 8"
                    answer: "A"
                    explanation: "根据勾股定理：3²+4²=9+16=25，∴斜边=√25=5"
                    source: "人教版数学"
                    gradeLevel: "初二"
                    knowledgePoints:
                      - id: "kp_001"
                        name: "勾股定理"
                        subject: "数学"
                    errorNoteCount: 2
                    createdAt: "2026-04-01T08:00:00Z"
                total: 1200
                limit: 20
                offset: 0

    post:
      tags:
        - Questions
      summary: 添加新题目
      description: 添加新的题目到题库（仅管理员和教师可操作）
      operationId: createQuestion
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionRequest"
            example:
              subject: "数学"
              type: "choice"
              difficulty: 3
              content: "已知函数 f(x)=x^2，求 f(3) 的值"
              options: ["A. 6", "B. 9", "C. 12", "D. 18"]
              answer: "B"
              explanation: "f(3)=3^2=9"
              source: "人教版数学"
              gradeLevel: "高一"
      responses:
        "200":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "400":
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
