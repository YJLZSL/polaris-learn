openapi: "3.0.3"
info:
  title: Polaris - 开放API
  description: |
    Polaris 北极星学习平台开放API接口文档。提供AI辅导、LLM代理、题库管理、游戏化学习等接口。

    ## 快速开始
    1. **注册账号** - 在 Polaris 平台注册账号
    2. **获取API Key** - 在个人中心的「API Keys」页面创建虚拟API Key
    3. **调用API** - 使用 `X-API-Key` 请求头携带API Key发起请求

    ## 认证方式
    - **API Key** (`ApiKeyAuth`): 通过 `X-API-Key` 请求头或 `Authorization: Bearer <key>` 传递
    - **会话认证** (`BearerAuth`): 通过 NextAuth 的 session cookie 自动认证（仅限平台内调用）

    ## 错误响应
    所有接口在发生错误时都会返回统一格式：
    ```json
    { "error": "错误描述信息" }
    ```

    常见状态码：
    - `400` - 请求参数错误
    - `401` - 未认证 / API Key无效
    - `402` - 余额不足
    - `403` - 无权限
    - `404` - 资源不存在
    - `429` - 请求频率超限
    - `500` - 服务器内部错误

    ## 速率限制
    - 免费用户: 50 RPM
    - VIP用户: 200 RPM
    超出限制后返回 `429` 状态码。

  version: "1.0.0"
  contact:
    name: Polaris 开发团队
    email: dev@polaris.com
    url: https://polaris.com

servers:
  - url: "{baseUrl}"
    description: Polaris API服务器
    variables:
      baseUrl:
        default: "https://api.polaris.com"
        description: API服务器地址
        enum:
          - "https://api.polaris.com"
          - "http://localhost:3000"

tags:
  - name: Auth
    description: 用户认证相关接口
  - name: AI Tutoring
    description: AI辅导对话接口
  - name: LLM Proxy
    description: 公开LLM代理接口（OpenAI兼容格式）
  - name: Billing
    description: 计费和余额管理
  - name: Questions
    description: 题库管理接口
  - name: Game
    description: 游戏化学习接口（经验值、每日挑战）
  - name: Knowledge
    description: 知识图谱接口
  - name: User
    description: 用户信息和资料接口
  - name: Safety
    description: 内容安全检测接口

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: "从个人中心获取的API Key，格式: sk-edu-xxxxxx-xxxxxxxx"
    BearerAuth:
      type: http
      scheme: bearer
      description: "NextAuth Session Token（平台内自动携带）"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: 错误描述信息
          example: "请先登录"
      required:
        - error

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
          description: 用户姓名
          example: "张三"
          minLength: 1
        email:
          type: string
          format: email
          description: 邮箱地址
          example: "zhangsan@example.com"
        password:
          type: string
          description: 密码（至少6位）
          example: "password123"
          minLength: 6
        grade:
          type: string
          description: 年级
          example: "初三"
        role:
          type: string
          enum: [student, teacher]
          default: student
          description: 用户角色
      required:
        - name
        - email
        - password

    RegisterResponse:
      type: object
      properties:
        id:
          type: string
          example: "user_abc123"
        name:
          type: string
          example: "张三"
        email:
          type: string
          example: "zhangsan@example.com"
        grade:
          type: string
          example: "初三"
        role:
          type: string
          example: "student"

    ChatRequest:
      type: object
      properties:
        message:
          type: string
          description: 用户发送的消息内容
          example: "请帮我理解勾股定理"
          minLength: 1
        conversationId:
          type: string
          description: 对话ID（可选，用于继续已有对话）
          example: "conv_abc123"
        subject:
          type: string
          description: 学科
          example: "数学"
        stream:
          type: boolean
          default: false
          description: 是否使用流式响应
      required:
        - message

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
          description: 消息角色
        content:
          type: string
          description: 消息内容
        stage:
          type: string
          description: 苏格拉底教学阶段
          enum: [diagnostic, clarification, hypothesis, reasoning, reflection, verification, guide]
        isCorrect:
          type: boolean
          description: 学生回答是否正确（仅 assistant 消息）
      required:
        - role
        - content

    ChatResponse:
      type: object
      properties:
        id:
          type: string
          example: "msg_abc123"
        conversationId:
          type: string
          example: "conv_abc123"
        role:
          type: string
          example: "assistant"
        content:
          type: string
          example: "勾股定理是直角三角形两条直角边的平方和等于斜边的平方..."
        stage:
          type: string
          example: "guide"
        tokens:
          type: object
          properties:
            input:
              type: integer
              example: 45
            output:
              type: integer
              example: 120
        cost:
          type: number
          example: 0.0003
      required:
        - id
        - role
        - content

    Conversation:
      type: object
      properties:
        id:
          type: string
          example: "conv_abc123"
        subject:
          type: string
          example: "数学"
        title:
          type: string
          example: "勾股定理学习"
        status:
          type: string
          enum: [active, completed]
        lastMessage:
          type: object
          properties:
            role:
              type: string
            content:
              type: string
            createdAt:
              type: string
              format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConversationListResponse:
      type: object
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/Conversation"
        total:
          type: integer
          example: 25
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0

    ApiKey:
      type: object
      properties:
        id:
          type: string
          example: "key_abc123"
        name:
          type: string
          example: "我的API Key"
        prefix:
          type: string
          example: "sk-edu-a1b2c3"
        status:
          type: string
          enum: [active, revoked]
        rateLimitRpm:
          type: integer
          example: 50
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time

    CreateApiKeyRequest:
      type: object
      properties:
        name:
          type: string
          description: API Key名称
          example: "我的API Key"
          minLength: 1
        rateLimitRpm:
          type: integer
          description: 每分钟请求限制
          example: 50
          default: 50
      required:
        - name

    CreateApiKeyResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        prefix:
          type: string
        rawKey:
          type: string
          description: "完整的API Key（仅创建时返回一次，请妥善保管）"
          example: "sk-edu-a1b2c3-d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9"
        status:
          type: string
        rateLimitRpm:
          type: integer
        createdAt:
          type: string
          format: date-time

    ApiKeyListResponse:
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/ApiKey"

    RevokedKeyResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        prefix:
          type: string
        status:
          type: string
          example: "revoked"
        revokedAt:
          type: string
          format: date-time

    BalanceResponse:
      type: object
      properties:
        balance:
          type: number
          description: 账户余额（CNY）
          example: 12.50
        currency:
          type: string
          example: "CNY"

    RechargeRequest:
      type: object
      properties:
        amount:
          type: number
          description: 充值金额（CNY），范围 1-10000
          example: 10
          minimum: 1
          maximum: 10000
        paymentMethod:
          type: string
          enum: [alipay, wechat]
          description: 支付方式
          example: "alipay"
      required:
        - amount
        - paymentMethod

    RechargeResponse:
      type: object
      properties:
        id:
          type: string
          example: "rech_abc123"
        amount:
          type: number
          example: 10
        paymentMethod:
          type: string
          example: "alipay"
        status:
          type: string
          enum: [pending, success, failed]
          example: "pending"
        paymentUrl:
          type: string
          description: 支付链接（生产环境返回）
          example: "https://pay.example.com/order/abc123"
        balance:
          type: number
          description: 充值后的余额（仅开发环境自动完成时返回）
          example: 22.50
        createdAt:
          type: string
          format: date-time

    UsageResponse:
      type: object
      properties:
        monthSummary:
          type: object
          properties:
            requestCount:
              type: integer
              example: 256
            totalTokens:
              type: integer
              example: 128000
            totalCost:
              type: number
              example: 0.35
        dailyUsage:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
                example: "2026-05-01"
              requestCount:
                type: integer
              totalTokens:
                type: integer
              totalCost:
                type: number

    Question:
      type: object
      properties:
        id:
          type: string
          example: "q_abc123"
        subject:
          type: string
          example: "数学"
        type:
          type: string
          enum: [choice, fill, essay]
          example: "choice"
        difficulty:
          type: integer
          minimum: 1
          maximum: 5
          example: 3
        content:
          type: string
          example: "在直角三角形ABC中..."
        options:
          type: array
          items:
            type: string
          example: ["A. 勾股定理", "B. 相似三角形", "C. 面积公式", "D. 三角函数"]
        answer:
          type: string
          example: "A"
        explanation:
          type: string
          example: "勾股定理是直角三角形的基本性质..."
        source:
          type: string
          example: "2024年中考真题"
        gradeLevel:
          type: string
          example: "初三"
        knowledgePoints:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              subject:
                type: string
        errorNoteCount:
          type: integer
          example: 5
        createdAt:
          type: string
          format: date-time

    QuestionListResponse:
      type: object
      properties:
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"
        total:
          type: integer
          example: 1200
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0

    CreateQuestionRequest:
      type: object
      properties:
        subject:
          type: string
          example: "数学"
        type:
          type: string
          enum: [choice, fill, essay]
          default: "choice"
          example: "choice"
        difficulty:
          type: integer
          minimum: 1
          maximum: 5
          default: 1
          example: 3
        content:
          type: string
          example: "已知函数 f(x)=x^2，求 f(3) 的值"
        options:
          type: array
          items:
            type: string
          example: ["A. 6", "B. 9", "C. 12", "D. 18"]
        answer:
          type: string
          example: "B"
        explanation:
          type: string
          example: "f(3)=3^2=9"
        source:
          type: string
          example: "人教版数学"
        gradeLevel:
          type: string
          example: "高一"
      required:
        - subject
        - content
        - answer

    ErrorNote:
      type: object
      properties:
        id:
          type: string
          example: "en_abc123"
        question:
          $ref: "#/components/schemas/Question"
        wrongAnswer:
          type: string
          example: "C"
        correctAnswer:
          type: string
          example: "B"
        status:
          type: string
          enum: [active, eliminated]
          example: "active"
        timesWrong:
          type: integer
          example: 3
        createdAt:
          type: string
          format: date-time
        lastMistakeAt:
          type: string
          format: date-time

    ErrorNoteListResponse:
      type: object
      properties:
        errorNotes:
          type: array
          items:
            $ref: "#/components/schemas/ErrorNote"
        total:
          type: integer
          example: 45
        totalPages:
          type: integer
          example: 3
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20

    XPRequest:
      type: object
      properties:
        amount:
          type: integer
          description: 经验值数量，范围 1-10000
          minimum: 1
          maximum: 10000
          example: 50
        reason:
          type: string
          description: 经验值来源原因
          example: "完成每日挑战"
          minLength: 1
        source:
          type: string
          description: 经验值来源类型
          example: "daily_challenge"
      required:
        - amount
        - reason

    XPResponse:
      type: object
      properties:
        xpEarned:
          type: integer
          example: 50
        totalXP:
          type: integer
          example: 1250
        level:
          type: integer
          example: 5
        leveledUp:
          type: boolean
          example: false
        newLevel:
          type: integer
          description: 升级后的等级（仅升级时返回）
        levelTitle:
          type: string
          example: "中学学徒"

    DailyChallenge:
      type: object
      properties:
        id:
          type: string
          example: "dc_abc123"
        date:
          type: string
          format: date
          example: "2026-05-07"
        question:
          $ref: "#/components/schemas/Question"
        completed:
          type: boolean
          example: false
        score:
          type: integer
          description: 得分（0-100），完成才有
        createdAt:
          type: string
          format: date-time

    KnowledgeGraphResponse:
      type: object
      properties:
        nodes:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
                example: "勾股定理"
              subject:
                type: string
                example: "数学"
              description:
                type: string
              gradeLevel:
                type: string
                example: "初二"
              parentId:
                type: string
              orderIndex:
                type: integer
              masteryLevel:
                type: integer
                description: 掌握度百分比 0-100
                example: 85
              practiceCount:
                type: integer
                example: 12
              lastPracticedAt:
                type: string
                format: date-time
        edges:
          type: array
          items:
            type: object
            properties:
              from:
                type: string
                description: 父节点ID
              to:
                type: string
                description: 子节点ID
              relation:
                type: string
                enum: [parent, prerequisite]
                description: 关系类型

    UserProfileResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: "张三"
        email:
          type: string
          example: "zhangsan@example.com"
        avatar:
          type: string
        grade:
          type: string
          example: "初三"
        role:
          type: string
          example: "student"
        xp:
          type: integer
          example: 2500
        level:
          type: integer
          example: 8
        streak:
          type: integer
          example: 15
        maxStreak:
          type: integer
          example: 30
        balance:
          type: number
          example: 12.50
        badges:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              description:
                type: string
              icon:
                type: string
              earnedAt:
                type: string
                format: date-time
        stats:
          type: object
          properties:
            conversationsCount:
              type: integer
              example: 42
            errorNotesCount:
              type: integer
              example: 15
            notesCount:
              type: integer
              example: 8
            recordsCount:
              type: integer
              example: 120
            todayQuestionsDone:
              type: integer
              example: 25
            todayQuestionsCorrect:
              type: integer
              example: 20
            todayXPEarned:
              type: integer
              example: 150
            todayStudyDuration:
              type: integer
              description: 学习时长（分钟）
              example: 45
        hasApiKey:
          type: boolean
          example: true

    HomeStatsResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            avatar:
              type: string
            xp:
              type: integer
            level:
              type: integer
            streak:
              type: integer
            maxStreak:
              type: integer
        todayStats:
          type: object
          properties:
            duration:
              type: integer
              description: 学习时长（分钟）
            questionsDone:
              type: integer
            questionsCorrect:
              type: integer
            xpEarned:
              type: integer
            correctRate:
              type: integer
              description: 正确率百分比 0-100
        recentRecords:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              questionsDone:
                type: integer
              xpEarned:
                type: integer
              duration:
                type: integer
              createdAt:
                type: string
                format: date-time

    SafetyCheckRequest:
      type: object
      properties:
        content:
          type: string
          description: 待检测的文本内容
          example: "你好，请问这道题怎么做？"
          minLength: 1
        type:
          type: string
          enum: [input, output]
          default: "input"
          description: 检测类型：input 用户输入，output AI输出
      required:
        - content

    SafetyCheckResponse:
      type: object
      properties:
        safe:
          type: boolean
          example: true
        reason:
          type: string
          description: 不安全原因（safe=false时返回）
        severity:
          type: string
          enum: [low, medium, high, critical]
        action:
          type: string
          description: 建议的处理方式
        checkedAt:
          type: string
          format: date-time

    LLMChatRequest:
      type: object
      properties:
        model:
          type: string
          description: 模型名称
          example: "deepseek-chat"
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [system, user, assistant]
              content:
                type: string
          minItems: 1
        stream:
          type: boolean
          default: false
          description: 是否流式响应
        temperature:
          type: number
          minimum: 0
          maximum: 2
          default: 0.7
        max_tokens:
          type: integer
          minimum: 1
          maximum: 16384
          default: 2048
      required:
        - model
        - messages

    LLMChatResponse:
      type: object
      properties:
        id:
          type: string
          example: "chatcmpl-abc123"
        object:
          type: string
          example: "chat.completion"
        created:
          type: integer
          example: 1746600000
        model:
          type: string
          example: "deepseek-chat"
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                    example: "assistant"
                  content:
                    type: string
              finish_reason:
                type: string
                example: "stop"
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer
            cost:
              type: number
              description: 本次请求费用（CNY）

    ModelInfo:
      type: object
      properties:
        id:
          type: string
          example: "deepseek-chat"
        provider:
          type: string
          example: "deepseek"
        displayName:
          type: string
          example: "DeepSeek Chat"
        pricing:
          type: object
          properties:
            input:
              type: number
              description: 输入价格（CNY/token）
            output:
              type: number
              description: 输出价格（CNY/token）

    ModelsResponse:
      type: object
      properties:
        providers:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: "deepseek"
              healthy:
                type: boolean
                example: true
              models:
                type: array
                items:
                  $ref: "#/components/schemas/ModelInfo"
        healthyCount:
          type: integer
          example: 3
        totalCount:
          type: integer
          example: 4

paths:
  # ==================== Auth ====================
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: 用户注册
      description: 创建新用户账号，自动分配初始API Key
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              name: "张三"
              email: "zhangsan@example.com"
              password: "password123"
              grade: "初三"
              role: "student"
      responses:
        "200":
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
              example:
                id: "user_abc123"
                name: "张三"
                email: "zhangsan@example.com"
                grade: "初三"
                role: "student"
        "400":
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "姓名不能为空"
        "409":
          description: 邮箱已注册
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "该邮箱已被注册"

  # ==================== AI Tutoring ====================
  /api/ai/chat:
    post:
      tags:
        - AI Tutoring
      summary: AI辅导对话
      description: |
        向AI老师发送消息，获取苏格拉底式教学辅导。支持会话记忆，可通过 `conversationId` 继续已有对话。

        教学流程采用苏格拉底引导式，阶段包括：
        - `diagnostic` - 诊断评估
        - `clarification` - 澄清理解
        - `hypothesis` - 提出假设
        - `reasoning` - 推理论证
        - `reflection` - 反思总结
        - `verification` - 验证掌握
        - `guide` - 引导推进
      operationId: aiChat
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
            examples:
              newConversation:
                summary: 新建对话
                value:
                  message: "请帮我理解勾股定理"
                  subject: "数学"
              continueConversation:
                summary: 继续已有对话
                value:
                  message: "那如何用勾股定理证明两个三角形相似呢？"
                  conversationId: "conv_abc123"
                  subject: "数学"
      responses:
        "200":
          description: AI回复
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
              example:
                id: "msg_xyz789"
                conversationId: "conv_abc123"
                role: "assistant"
                content: "好的，让我们从勾股定理的基本定义开始理解。首先，你能告诉我什么是直角三角形吗？"
                stage: "diagnostic"
                tokens:
                  input: 45
                  output: 98
                cost: 0.0002
        "400":
          description: 参数错误或内容安全问题
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "消息内容不能为空"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

