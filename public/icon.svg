<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded rect background with deep purple gradient -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle center glow for depth -->
  <circle cx="256" cy="256" r="180" fill="url(#centerGlow)" opacity="0.15"/>

  <!-- 4-pointed North Star (concave diamond) centered at 256,256 -->
  <path
    d="M256 96 L296 216 L416 256 L296 296 L256 416 L216 296 L96 256 L216 216 Z"
    fill="url(#star)"/>

  <!-- Bright white center dot -->
  <circle cx="256" cy="256" r="24" fill="#ffffff"/>

  <!-- Accent sparkle dots (warm white, low opacity) -->
  <circle cx="102" cy="102" r="4" fill="#fef3c7" opacity="0.75"/>
  <circle cx="420" cy="143" r="3" fill="#fef3c7" opacity="0.65"/>
  <circle cx="399" cy="420" r="3.5" fill="#fef3c7" opacity="0.7"/>
</svg>
