name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Release 流水线不取消正在进行的运行，避免中断发布
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # 15.3 质量检查 job
  # ===========================================================================
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

  # ===========================================================================
  # 15.4 Android 构建 job
  # ===========================================================================
  build-android:
    name: Build Android
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # 通过环境变量间接判断 secret 是否存在（secrets 不能直接在 if 条件中比较）
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          cache: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode keystore
        if: env.HAS_KEYSTORE == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      - name: Create key.properties
        if: env.HAS_KEYSTORE == 'true'
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          {
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
            echo "storeFile=keystore.jks"
          } > android/key.properties

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Rename artifacts
        run: |
          VERSION="${{ github.ref_name }}"
          cd build/app/outputs/flutter-apk
          mv app-armeabi-v7a-release.apk "lingxi-academy-${VERSION}-android-armeabi-v7a.apk"
          mv app-arm64-v8a-release.apk "lingxi-academy-${VERSION}-android-arm64-v8a.apk"
          mv app-x86_64-release.apk "lingxi-academy-${VERSION}-android-x86_64.apk"
          cd ../bundle/release
          mv app-release.aab "lingxi-academy-${VERSION}-android.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            build/app/outputs/flutter-apk/lingxi-academy-*.apk
            build/app/outputs/bundle/release/lingxi-academy-*.aab
          retention-days: 30

  # ===========================================================================
  # 15.5 Windows 构建 job
  # ===========================================================================
  build-windows:
    name: Build Windows
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create MSIX installer
        continue-on-error: true
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          MSIX_VER="${VERSION#v}"
          dart run msix:create \
            --install-certificate false \
            --version "${MSIX_VER}.0" \
            --output-name "lingxi-academy-${VERSION}-windows" \
            --output-path "."

      - name: Zip Windows build
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          cd build/windows/x64/runner/Release
          7z a -tzip "../../../../lingxi-academy-${VERSION}-windows-x64.zip" .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: lingxi-academy-*-windows-x64.zip
          retention-days: 30

      - name: Upload Windows MSIX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: lingxi-academy-*-windows.msix
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================================================
  # 15.6 macOS 构建 job
  # ===========================================================================
  build-macos:
    name: Build macOS
    needs: quality
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Create DMG installer
        continue-on-error: true
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          APP_PATH="build/macos/Build/Products/Release/lingxi_academy.app"
          DMG_NAME="lingxi-academy-${VERSION}-macos.dmg"
          rm -f "$DMG_NAME"
          brew install create-dmg
          create-dmg \
            --volname "灵犀学院" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 425 200 \
            "$DMG_NAME" \
            "$APP_PATH" \
            || hdiutil create -volname "灵犀学院" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_NAME"

      - name: Zip macOS build
        run: |
          VERSION="${{ github.ref_name }}"
          cd build/macos/Build/Products/Release
          ditto -c -k --keepParent lingxi_academy.app "lingxi-academy-${VERSION}-macos.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: build/macos/Build/Products/Release/lingxi-academy-*-macos.zip
          retention-days: 30

      - name: Upload macOS DMG
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: lingxi-academy-*-macos.dmg
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================================================
  # 15.7 发布 job
  # ===========================================================================
  release:
    name: Publish Release
    needs: [build-android, build-windows, build-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-files/*
